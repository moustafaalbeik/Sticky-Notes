<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Search Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #1e1e1e;
      color: #f0f0f0;
      user-select: none;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .drag {
      height: 8px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .input-wrap {
      padding: 4px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      -webkit-app-region: drag;
    }
    input {
      -webkit-app-region: no-drag;
      width: 100%;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: #f0f0f0;
      font-size: 17px;
      outline: none;
      user-select: text;
    }
    input::placeholder { color: rgba(255,255,255,0.35); }
    #results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .result {
      padding: 9px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s ease;
    }
    .result:hover, .result.selected {
      background: rgba(255,255,255,0.08);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .text {
      font-size: 13.5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-style: italic;
    }
    mark {
      background: rgba(255,225,107,0.55);
      color: #1e1e1e;
      padding: 0 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="drag"></div>
  <div class="input-wrap">
    <input type="text" id="q" placeholder="Search notes..." autocomplete="off" spellcheck="false" />
  </div>
  <div id="results"></div>

  <script>
    const q = document.getElementById('q');
    const resultsEl = document.getElementById('results');
    let notes = [];
    let matches = [];
    let selectedIndex = 0;

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      })[c]);
    }

    function highlight(text, query) {
      if (!query) return escapeHtml(text);
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return escapeHtml(text);
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + query.length);
      const after = text.slice(idx + query.length);
      return escapeHtml(before) + '<mark>' + escapeHtml(match) + '</mark>' + escapeHtml(after);
    }

    function render() {
      const query = q.value.trim();
      matches = query
        ? notes.filter((n) => n.text.toLowerCase().includes(query.toLowerCase()))
        : notes;

      if (selectedIndex >= matches.length) selectedIndex = 0;

      if (matches.length === 0) {
        resultsEl.innerHTML = `<div class="empty">${
          notes.length === 0 ? 'No notes yet' : 'No matches'
        }</div>`;
        return;
      }

      resultsEl.innerHTML = matches
        .map((n, i) => {
          const preview = n.text || '(empty)';
          return `<div class="result ${
            i === selectedIndex ? 'selected' : ''
          }" data-id="${escapeHtml(n.id)}">
            <div class="dot" style="background:${n.color}"></div>
            <div class="text">${highlight(preview, query)}</div>
          </div>`;
        })
        .join('');

      resultsEl.querySelectorAll('.result[data-id]').forEach((el) => {
        el.addEventListener('click', () => {
          window.api.search.focus(el.dataset.id);
        });
        el.addEventListener('mouseenter', () => {
          const idx = [...resultsEl.children].indexOf(el);
          if (idx !== -1) {
            selectedIndex = idx;
            updateSelection();
          }
        });
      });
    }

    function updateSelection() {
      resultsEl.querySelectorAll('.result').forEach((el, i) => {
        el.classList.toggle('selected', i === selectedIndex);
      });
      const sel = resultsEl.querySelector('.selected');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    q.addEventListener('input', () => {
      selectedIndex = 0;
      render();
    });

    q.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.api.search.close();
      } else if (e.key === 'Enter') {
        if (matches[selectedIndex]) {
          window.api.search.focus(matches[selectedIndex].id);
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (selectedIndex < matches.length - 1) {
          selectedIndex++;
          updateSelection();
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (selectedIndex > 0) {
          selectedIndex--;
          updateSelection();
        }
      }
    });

    async function init() {
      notes = await window.api.search.list();
      render();
      q.focus();
    }
    init();
  </script>
</body>
</html>
